<% require "digest" %>
# API Tokens fixtures
# Plaintext tokens are only stored here for test setup purposes — the application
# stores SHA256 digests. The `<fixture>_raw_token` helper below documents the raw
# values that produce these digests.
one:
  token_digest: <%= Digest::SHA256.hexdigest("test_token_one_abc123def456") %>
  name: Test Token One
  user: one
  last_used_at: nil

two:
  token_digest: <%= Digest::SHA256.hexdigest("test_token_two_xyz789ghi012") %>
  name: Test Token Two
  user: two
  last_used_at: nil
