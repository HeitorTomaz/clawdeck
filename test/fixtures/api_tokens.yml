<% require "digest" %>
# API Tokens fixtures
# Plaintext tokens are only stored here for test setup purposes — the application
# stores SHA256 digests. The `FIXTURE_RAW_TOKENS` helper in api_token_test.rb
# documents the raw values that produce these digests.
one:
  token_digest: <%= Digest::SHA256.hexdigest("test_token_one_abc123def456") %>
  name: Test Token One
  agent: one_primary
  last_used_at: nil

two:
  token_digest: <%= Digest::SHA256.hexdigest("test_token_two_xyz789ghi012") %>
  name: Test Token Two
  agent: two_primary
  last_used_at: nil
